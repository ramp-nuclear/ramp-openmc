# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Ruff check
      uses: astral-sh/ruff-action@v3

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: setup-micromamba
      uses: mamba-org/setup-micromamba@v2.0.6
      with:
        environment-file: requirements.yml
        environment-name: openmcadapter-${{ github.run_id }}-${{ github.run_attempt }}
        post-cleanup: 'all'
    - name: Install this package
      run: |
        pip install .
      shell: micromamba-shell {0}
    - name: Run and import
      run: |
        python3 -c "from openmcadapter import OpenMCOracle"
      shell: micromamba-shell {0}

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Make requirements file
      run: |
        cp requirements.yml allreq.yml
        tail -n +2 tests_requirements.yml >> allreq.yml
    - name: setup-micromamba
      uses: mamba-org/setup-micromamba@v2.0.6
      with:
        environment-file: allreq.yml
        environment-name: openmcadapter-test-${{ github.run_id }}-${{ github.run_attempt }}
        post-cleanup: 'all'
    - name: Install package
      run: |
        pip install .[test]
      shell: micromamba-shell {0}
    - name: Test with pytest
      run: |
        cd tests
        pytest -v -k "not xs"
      env:
        OPENMC_CROSS_SECTIONS: cross_sections.xml
      shell: micromamba-shell {0}
